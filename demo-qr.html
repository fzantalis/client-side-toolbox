<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css"/><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <title>QR Code Generator</title>
</head>
<body>
  <div class="container">
    <a href="index.html" class="breadcrumb"><i class="ph ph-arrow-left"></i> Back to Toolbox</a>
    <header class="tool-header"><div class="card-icon"><i class="ph ph-qr-code"></i></div>
      <div class="tool-header-text"><h1>QR Code Generator</h1><p>Generate tracking-free QR codes instantly.</p></div>
    </header>
    <main class="workspace">
      <div class="panel">
        <div class="panel-header"><h3>Link or Text</h3></div>
        <div class="panel-body">
          <textarea id="qr-text" placeholder="https://example.com" style="height:150px; border-radius:8px;"></textarea>
          <div class="form-group"><label>QR Code Size</label><input type="range" id="size" min="100" max="400" value="250"></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header"><h3>Output</h3></div>
        <div class="panel-body" style="align-items:center; justify-content:center;">
          <canvas id="qr-canvas" style="background:white; padding:10px; border-radius:8px; box-shadow:var(--shadow-sm);"></canvas>
          <button onclick="downloadQR()" class="btn-primary" style="margin-top:1rem;"><i class="ph ph-download-simple"></i> Download PNG</button>
        </div>
      </div>
    </main>
    <footer style="text-align: center; padding: 2rem 0; margin-top: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem;">
      <p>&copy; <script>document.write(new Date().getFullYear())</script> Client-Side Toolbox. All rights reserved.</p>
      <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 0.5rem;">
        <a href="privacy.html" style="color: var(--text-muted); text-decoration: none;">Privacy Policy</a>
        <span>&bull;</span>
        <a href="terms.html" style="color: var(--text-muted); text-decoration: none;">Terms of Service</a>
      </div>
    </footer>
  </div>
  <script>
    const qrText = document.getElementById('qr-text');
    const sizeInput = document.getElementById('size');
    const qr = new QRious({ element: document.getElementById('qr-canvas'), value: 'https://example.com', size: 250, level: 'M' });

    function updateQR() {
      qr.value = qrText.value || 'https://example.com';
      qr.size = sizeInput.value;
    }

    qrText.addEventListener('input', updateQR);
    sizeInput.addEventListener('input', updateQR);

    function downloadQR() {
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = document.getElementById('qr-canvas').toDataURL();
      link.click();
    }
  </script>
  <script src="theme-toggle.js"></script>
  <script src="script.js"></script>
</body></html>
