<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
  <title>QR Code Generator</title>
  <style>
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    .form-control { width: 100%; padding: 0.65rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-family: inherit; font-size: 0.85rem; }
    .form-control:focus { outline: none; border-color: var(--primary); }
    .color-picker { height: 42px; padding: 2px 4px; cursor: pointer; }
    .slider-group { margin-top: 1rem; }
    .slider-group label { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; }
    .slider-group input[type="range"] { width: 100%; cursor: pointer; }
    
    /* Transparent background checkerboard for the canvas container to show background colors clearly */
    .canvas-wrapper {
      background-image: linear-gradient(45deg, #f0f0f0 25%, transparent 25%), 
                        linear-gradient(-45deg, #f0f0f0 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #f0f0f0 75%), 
                        linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      display: inline-block;
    }
    
    [data-theme="dark"] .canvas-wrapper {
      background-image: linear-gradient(45deg, #1a1a1a 25%, transparent 25%), 
                        linear-gradient(-45deg, #1a1a1a 25%, transparent 25%), 
                        linear-gradient(45deg, transparent 75%, #1a1a1a 75%), 
                        linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="breadcrumb"><i class="ph ph-arrow-left"></i> Back to Toolbox</a>
    <header class="tool-header">
      <div class="card-icon"><i class="ph ph-qr-code"></i></div>
      <div class="tool-header-text">
        <h1>QR Code Generator</h1>
        <p>Generate highly customizable, tracking-free QR codes instantly.</p>
      </div>
    </header>
    
    <main style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:1.5rem;">
      <div class="panel">
        <div class="panel-header"><h3>Content & Aesthetics</h3></div>
        <div class="panel-body">
          <label style="font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; display: block;">QR Content (Link or Text)</label>
          <textarea id="qr-text" class="form-control" placeholder="https://example.com" style="height:100px; resize:vertical;"></textarea>
          
          <div class="settings-grid">
            <div>
              <label style="font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; display: block;">Foreground Color</label>
              <input type="color" id="fg-color" value="#000000" class="form-control color-picker">
            </div>
            <div>
              <label style="font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; display: block;">Background Color</label>
              <input type="color" id="bg-color" value="#ffffff" class="form-control color-picker">
            </div>
            <div style="grid-column: span 2;">
              <label style="font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; display: block;">Error Correction Level</label>
              <select id="err-level" class="form-control">
                <option value="L">Low (7% - Cleaner look)</option>
                <option value="M" selected>Medium (15% - Standard)</option>
                <option value="Q">Quartile (25% - Dense)</option>
                <option value="H">High (30% - Best for logos)</option>
              </select>
            </div>
          </div>

          <div class="slider-group">
            <label><span>Size</span> <span id="size-val" style="color:var(--text-muted)">250px</span></label>
            <input type="range" id="size" min="100" max="600" value="250">
          </div>
          
          <div class="slider-group">
            <label><span>Padding</span> <span id="padding-val" style="color:var(--text-muted)">0px</span></label>
            <input type="range" id="padding" min="0" max="100" value="0">
          </div>
        </div>
      </div>
      
      <div class="panel">
        <div class="panel-header"><h3>Output</h3></div>
        <div class="panel-body" style="align-items:center; justify-content:center;">
          <div class="canvas-wrapper">
            <canvas id="qr-canvas" style="display:block;"></canvas>
          </div>
          <button onclick="downloadQR()" class="btn-primary" style="margin-top:2rem; width:100%; justify-content:center;">
            <i class="ph ph-download-simple"></i> Download High-Res PNG
          </button>
        </div>
      </div>
    </main>
    
    <footer style="text-align: center; padding: 2rem 0; margin-top: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem;">
      <p>&copy; <script>document.write(new Date().getFullYear())</script> Client-Side Toolbox. All rights reserved.</p>
      <div style="margin-top: 1rem; margin-bottom: 1rem;">
      <a href="https://github.com/fzantalis/client-side-toolbox" target="_blank" rel="noopener noreferrer" style="color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 500; transition: color 0.2s;">
        <i class="ph ph-github-logo" style="font-size: 1.25rem;"></i>
        View Source on GitHub
      </a>
    </div>
      <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 0.5rem;">
        <a href="privacy.html" style="color: var(--text-muted); text-decoration: none;">Privacy Policy</a>
        <span>&bull;</span>
        <a href="terms.html" style="color: var(--text-muted); text-decoration: none;">Terms of Service</a>
      </div>
    </footer>
  </div>
  
  <script>
    const qrText = document.getElementById('qr-text');
    const sizeInput = document.getElementById('size');
    const paddingInput = document.getElementById('padding');
    const fgColorInput = document.getElementById('fg-color');
    const bgColorInput = document.getElementById('bg-color');
    const errLevelInput = document.getElementById('err-level');
    
    const sizeVal = document.getElementById('size-val');
    const paddingVal = document.getElementById('padding-val');

    // Initialize QRious
    const qr = new QRious({ 
      element: document.getElementById('qr-canvas'), 
      value: 'https://example.com', 
      size: 250, 
      level: 'M',
      padding: 0,
      foreground: '#000000',
      background: '#ffffff'
    });

    function updateQR() {
      // Update labels
      sizeVal.textContent = sizeInput.value + 'px';
      paddingVal.textContent = paddingInput.value + 'px';

      // Update QR properties
      qr.set({
        value: qrText.value || 'https://example.com',
        size: parseInt(sizeInput.value),
        padding: parseInt(paddingInput.value),
        foreground: fgColorInput.value,
        background: bgColorInput.value,
        level: errLevelInput.value
      });
    }

    // Attach listeners
    qrText.addEventListener('input', updateQR);
    sizeInput.addEventListener('input', updateQR);
    paddingInput.addEventListener('input', updateQR);
    fgColorInput.addEventListener('input', updateQR);
    bgColorInput.addEventListener('input', updateQR);
    errLevelInput.addEventListener('change', updateQR);

    function downloadQR() {
      const link = document.createElement('a');
      link.download = 'custom-qrcode.png';
      link.href = document.getElementById('qr-canvas').toDataURL('image/png');
      link.click();
    }
  </script>
  <script src="theme-toggle.js"></script>
  <script src="script.js"></script>
</body>
</html>
