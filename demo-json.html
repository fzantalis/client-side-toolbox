<body>
  <div class="container">

      <i class="ph ph-arrow-left"></i> Back to Toolbox

      <div class="card-icon"><i class="ph ph-brackets-curly"></i></div>
      <div class="tool-header-text">
        <h1>JSON Beautifier</h1>
        <p>Format, validate, and structure your JSON data instantly.</p>
      </div>
    </header>

    <main class="workspace">
      
      <div class="panel">
        <div class="panel-header">
          <h3>Input</h3>
          <div class="panel-actions">
            <button id="clearBtn" class="btn-secondary"><i class="ph ph-trash"></i> Clear</button>
            <button id="formatBtn" class="btn-primary"><i class="ph ph-magic-wand"></i> Beautify</button>

            <!-- ✅ NEW BUTTONS -->
            <button id="minifyBtn" class="btn-secondary"><i class="ph ph-arrows-in-simple"></i> Minify</button>
            <button id="treeBtn" class="btn-secondary"><i class="ph ph-tree-structure"></i> Tree</button>
          </div>
        </div>
        <textarea id="input" placeholder="Paste your raw JSON here..."></textarea>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h3>Output</h3>
          <button id="copyBtn" class="btn-secondary"><i class="ph ph-copy"></i> Copy</button>
        </div>

        <!-- ✅ KEEP ORIGINAL -->
        <pre id="output">Result will appear here...</pre>

        <!-- ✅ ADD TREE VIEW (hidden by default) -->
        <div id="treeOutput" style="display:none;"></div>
      </div>

    </main>

    <!-- ✅ YOUR FOOTER UNTOUCHED -->

<script>
document.addEventListener('DOMContentLoaded', () => {

  const inputEl = document.getElementById('input');
  const outputEl = document.getElementById('output');
  const treeOutput = document.getElementById('treeOutput');

  const formatBtn = document.getElementById('formatBtn');
  const minifyBtn = document.getElementById('minifyBtn');
  const treeBtn = document.getElementById('treeBtn');
  const clearBtn = document.getElementById('clearBtn');
  const copyBtn = document.getElementById('copyBtn');

  // Beautify
  const jsonBeautify = (input) => {
    try {
      const parsed = JSON.parse(input);
      return { success: true, data: JSON.stringify(parsed, null, 2), json: parsed };
    } catch(e) {
      return { success: false, data: 'Invalid JSON:\n' + e.message };
    }
  };

  // Minify
  const jsonMinify = (input) => {
    try {
      const parsed = JSON.parse(input);
      return { success: true, data: JSON.stringify(parsed), json: parsed };
    } catch(e) {
      return { success: false, data: 'Invalid JSON:\n' + e.message };
    }
  };

  // Highlight (SAFE - doesn't override your CSS)
  const highlightJSON = (jsonString) => {
    treeOutput.style.display = 'none';
    outputEl.style.display = 'block';
    outputEl.innerHTML = hljs.highlight(jsonString, { language: 'json' }).value;
  };

  // Tree builder
  const createTree = (obj) => {
    const ul = document.createElement('ul');

    Object.entries(obj).forEach(([key, value]) => {
      const li = document.createElement('li');

      if (typeof value === 'object' && value !== null) {
        const span = document.createElement('span');
        span.textContent = key;

        const child = createTree(value);
        child.style.display = 'none';

        span.onclick = () => {
          child.style.display = child.style.display === 'none' ? 'block' : 'none';
        };

        li.appendChild(span);
        li.appendChild(child);
      } else {
        li.textContent = `${key}: ${value}`;
      }

      ul.appendChild(li);
    });

    return ul;
  };

  // Beautify
  formatBtn.addEventListener('click', () => {
    const result = jsonBeautify(inputEl.value);

    if (!result.success) {
      outputEl.textContent = result.data;
      outputEl.classList.add('error-text');
      return;
    }

    outputEl.classList.remove('error-text');
    highlightJSON(result.data);
  });

  // Minify
  minifyBtn.addEventListener('click', () => {
    const result = jsonMinify(inputEl.value);

    if (!result.success) {
      outputEl.textContent = result.data;
      outputEl.classList.add('error-text');
      return;
    }

    outputEl.classList.remove('error-text');
    highlightJSON(result.data);
  });

  // Tree
  treeBtn.addEventListener('click', () => {
    try {
      const parsed = JSON.parse(inputEl.value);

      outputEl.style.display = 'none';
      treeOutput.style.display = 'block';
      treeOutput.innerHTML = '';
      treeOutput.appendChild(createTree(parsed));

    } catch(e) {
      outputEl.style.display = 'block';
      treeOutput.style.display = 'none';
      outputEl.textContent = 'Invalid JSON:\n' + e.message;
      outputEl.classList.add('error-text');
    }
  });

  // Clear
  clearBtn.addEventListener('click', () => {
    inputEl.value = '';
    outputEl.textContent = 'Result will appear here...';
    treeOutput.innerHTML = '';
  });

  // Copy
  copyBtn.addEventListener('click', () => {
    const text = (treeOutput.style.display === 'block')
      ? treeOutput.innerText
      : outputEl.innerText;

    navigator.clipboard.writeText(text);
  });

});
</script>
