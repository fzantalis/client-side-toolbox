<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <title>Tip Calculator</title>
  <style>
    .form-control { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text-main); font-family: inherit; font-size: 1rem; outline: none; }
    .form-control:focus { border-color: var(--primary); }
    .breakdown-row { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--border); }
    .breakdown-row span { color: var(--text-muted); font-size: 1.1rem; }
    .breakdown-row strong { font-size: 1.5rem; color: var(--text-main); }
    .breakdown-row.highlight strong { color: #10b981; font-size: 2.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="breadcrumb"><i class="ph ph-arrow-left"></i> Back to Toolbox</a>
    <header class="tool-header">
      <div class="card-icon"><i class="ph ph-coins"></i></div>
      <div class="tool-header-text">
        <h1>Tip Calculator</h1>
        <p>Calculate gratuity and perfectly split bills among friends easily.</p>
      </div>
    </header>
    <main class="workspace">
      <div class="panel">
        <div class="panel-header"><h3>Bill Details</h3></div>
        <div class="panel-body">
          <div class="form-group">
            <label>Bill Amount ($)</label>
            <input type="number" id="bill" class="form-control" value="50.00" oninput="calculateTip()">
          </div>
          <div class="form-group" style="margin-top: 1rem;">
            <label style="display: flex; justify-content: space-between;">
              <span>Tip Percentage</span>
              <strong id="tipLabel" style="color: var(--primary);">15%</strong>
            </label>
            <input type="range" id="tipPct" min="0" max="50" value="15" oninput="calculateTip()" style="width: 100%; margin-top: 0.5rem; cursor: pointer;">
          </div>
          <div class="form-group" style="margin-top: 1rem;">
            <label>Split Between (People)</label>
            <input type="number" id="split" class="form-control" value="1" min="1" oninput="calculateTip()">
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header"><h3>Breakdown</h3></div>
        <div class="panel-body" style="justify-content: flex-start; padding: 2rem;">
          <div class="breakdown-row">
            <span>Tip Amount</span>
            <strong id="tipAmount">$7.50</strong>
          </div>
          <div class="breakdown-row">
            <span>Total Bill</span>
            <strong id="totalBill">$57.50</strong>
          </div>
          <div class="breakdown-row highlight" id="splitSection" style="display: none; border-bottom: none; margin-top: 1rem;">
            <span>Per Person</span>
            <strong id="totalPerPerson">$57.50</strong>
          </div>
        </div>
      </div>
    </main>
    <footer style="text-align: center; padding: 2rem 0; margin-top: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem;">
      <p>&copy; <script>document.write(new Date().getFullYear())</script> Client-Side Toolbox. All rights reserved.</p>
      <div style="margin-top: 1rem; margin-bottom: 1rem;">
      <a href="https://github.com/fzantalis/client-side-toolbox" target="_blank" rel="noopener noreferrer" style="color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 500; transition: color 0.2s;">
        <i class="ph ph-github-logo" style="font-size: 1.25rem;"></i>
        View Source on GitHub
      </a>
    </div>
      <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 0.5rem;">
        <a href="privacy.html" style="color: var(--text-muted); text-decoration: none;">Privacy Policy</a>
        <span>&bull;</span>
        <a href="terms.html" style="color: var(--text-muted); text-decoration: none;">Terms of Service</a>
      </div>
    </footer>
  </div>
  <script>
    function calculateTip() {
      const bill = parseFloat(document.getElementById('bill').value) || 0;
      const tipPct = parseFloat(document.getElementById('tipPct').value);
      const split = parseInt(document.getElementById('split').value) || 1;
      
      document.getElementById('tipLabel').innerText = tipPct + '%';

      const tipAmt = bill * (tipPct / 100);
      const total = bill + tipAmt;
      const perPerson = total / split;

      document.getElementById('tipAmount').innerText = '$' + tipAmt.toFixed(2);
      document.getElementById('totalBill').innerText = '$' + total.toFixed(2);
      
      const splitSec = document.getElementById('splitSection');
      if (split > 1) {
        splitSec.style.display = 'flex';
        document.getElementById('totalPerPerson').innerText = '$' + perPerson.toFixed(2);
      } else {
        splitSec.style.display = 'none';
      }
    }
  </script>
  <script src="script.js"></script>
  <script src="theme-toggle.js"></script>
</body>
</html>
