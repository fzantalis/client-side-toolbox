<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P File Transfer (Client Only)</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<style>
body { font-family: sans-serif; background:#0f172a; color:#e5e7eb; padding:20px; }
textarea { width:100%; height:100px; margin-top:10px; }
button { margin-top:10px; padding:10px; cursor:pointer; }
#qr { margin-top:15px; }
</style>
</head>
<body>

<h2>P2P File Transfer (Client Only)</h2>

<button onclick="startSender()">Start as Sender</button>
<button onclick="startReceiver()">Start as Receiver</button>

<hr>

<div id="sender" style="display:none;">
  <h3>Sender</h3>
  <b>Offer:</b>
  <textarea id="offer"></textarea>
  <canvas id="qr"></canvas>

  <b>Paste Answer:</b>
  <textarea id="answer"></textarea>
  <button onclick="connectSender()">Connect</button>

  <input type="file" id="fileInput">
  <button onclick="sendFile()">Send File</button>
</div>

<div id="receiver" style="display:none;">
  <h3>Receiver</h3>
  <b>Paste Offer:</b>
  <textarea id="offerIn"></textarea>
  <button onclick="acceptOffer()">Accept</button>

  <b>Answer:</b>
  <textarea id="answerOut"></textarea>

  <h4>Received:</h4>
  <div id="downloads"></div>
</div>

<script>
let pc, dc;

const ICE = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" }
  ]
};

function waitIce(pc) {
  return new Promise(res => {
    if (pc.iceGatheringState === "complete") return res();
    pc.addEventListener("icegatheringstatechange", () => {
      if (pc.iceGatheringState === "complete") res();
    });
  });
}

function encode(x){ return btoa(JSON.stringify(x)); }
function decode(x){ return JSON.parse(atob(x)); }

function logState() {
  pc.onconnectionstatechange = () => {
    console.log("STATE:", pc.connectionState);
  };
}

function startSender() {
  document.getElementById("sender").style.display="block";
  pc = new RTCPeerConnection(ICE);
  logState();

  dc = pc.createDataChannel("file");
  setupSendChannel();

  createOffer();
}

async function createOffer() {
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  await waitIce(pc);

  const code = encode(pc.localDescription);
  document.getElementById("offer").value = code;

  QRCode.toCanvas(document.getElementById("qr"), code);
}

async function connectSender() {
  const ans = decode(document.getElementById("answer").value);
  await pc.setRemoteDescription(ans);
}

function startReceiver() {
  document.getElementById("receiver").style.display="block";
}

async function acceptOffer() {
  pc = new RTCPeerConnection(ICE);
  logState();

  pc.ondatachannel = e => {
    dc = e.channel;
    setupReceiveChannel();
  };

  const offer = decode(document.getElementById("offerIn").value);
  await pc.setRemoteDescription(offer);

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  await waitIce(pc);

  const code = encode(pc.localDescription);
  document.getElementById("answerOut").value = code;
}

function setupSendChannel() {
  dc.onopen = () => console.log("Sender connected");
}

function setupReceiveChannel() {
  let chunks = [];
  let name = "";

  dc.onmessage = e => {
    if (typeof e.data === "string") {
      const meta = JSON.parse(e.data);
      name = meta.name;
      chunks = [];
    } else {
      chunks.push(e.data);
      if (e.data.byteLength < 64000) {
        const blob = new Blob(chunks);
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = name;
        a.textContent = "Download " + name;
        document.getElementById("downloads").appendChild(a);
        document.getElementById("downloads").appendChild(document.createElement("br"));
      }
    }
  };
}

function sendFile() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return;

  dc.send(JSON.stringify({ name: file.name }));

  const reader = new FileReader();
  reader.onload = e => {
    const buffer = e.target.result;
    let offset = 0;

    function sendChunk() {
      const chunk = buffer.slice(offset, offset + 64000);
      dc.send(chunk);
      offset += chunk.byteLength;

      if (offset < buffer.byteLength) {
        setTimeout(sendChunk, 0);
      }
    }

    sendChunk();
  };
  reader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
