<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css"/><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <title>Password Generator</title>
</head>
<body>
  <div class="container">
    <a href="index.html" class="breadcrumb"><i class="ph ph-arrow-left"></i> Back to Toolbox</a>
    <header class="tool-header">
      <div class="card-icon"><i class="ph ph-password"></i></div>
      <div class="tool-header-text">
        <h1>Strong Password Generator</h1>
        <p>Generate highly secure, localized passwords instantly.</p>
      </div>
    </header>
    <main class="workspace">
      <div class="panel">
        <div class="panel-header"><h3>Settings</h3></div>
        <div class="panel-body">
          <div class="form-group"><label>Password Length</label><input id="len" type="number" value="16" min="4" max="128"></div>
          <label class="checkbox-group"><input id="d" type="checkbox" checked> Include Numbers (0-9)</label>
          <label class="checkbox-group"><input id="s" type="checkbox" checked> Include Symbols (!@#...)</label>
          <button onclick="gen()" class="btn-primary" style="margin-top:auto;"><i class="ph ph-arrows-clockwise"></i> Generate Password</button>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header"><h3>Your Password</h3></div>
        <div class="panel-body">
          <div id="out" class="result-display" style="font-size:1.5rem; word-break:break-all;">Click generate</div>
        </div>
      </div>
    </main>
    <footer style="text-align: center; padding: 2rem 0; margin-top: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem;">
      <p>&copy; <script>document.write(new Date().getFullYear())</script> Client-Side Toolbox. All rights reserved.</p>
      <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 0.5rem;">
        <a href="privacy.html" style="color: var(--text-muted); text-decoration: none;">Privacy Policy</a>
        <span>&bull;</span>
        <a href="terms.html" style="color: var(--text-muted); text-decoration: none;">Terms of Service</a>
      </div>
    </footer>
  </div>
  <script>
    function gen(){
      const len=+document.getElementById('len').value||16;
      let pool='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
      if(document.getElementById('d').checked) pool+='0123456789';
      if(document.getElementById('s').checked) pool+='!@#$%^&*()_+-=[]{}|;:,.<>?';
      let out=''; for(let i=0;i<len;i++) out+=pool.charAt(Math.floor(Math.random()*pool.length));
      document.getElementById('out').textContent = out;
      navigator.clipboard?.writeText(out); // Auto copy!
    }
  </script>
  <script src="theme-toggle.js"></script>
  <script src="script.js"></script>
</body></html>
