<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css"/><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script><title>Text Diff Checker</title>
  <style>
    .diff-ins { background-color: #dcfce7; color: #166534; display:block; padding: 2px 4px; border-left: 3px solid #22c55e;}
    .diff-del { background-color: #fee2e2; color: #b91c1c; display:block; padding: 2px 4px; border-left: 3px solid #ef4444; text-decoration: line-through;}
    [data-theme="dark"] .diff-ins { background: rgba(34,197,94,0.15); color: #4ade80;}
    [data-theme="dark"] .diff-del { background: rgba(239,68,68,0.15); color: #f87171;}
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="breadcrumb"><i class="ph ph-arrow-left"></i> Back to Toolbox</a>
    <header class="tool-header"><div class="card-icon"><i class="ph ph-files"></i></div>
      <div class="tool-header-text"><h1>Text Diff Checker</h1><p>Compare two blocks of text to see exact line changes.</p></div>
    </header>
    
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:1.5rem;">
      <div class="panel" style="min-height: 250px;"><div class="panel-header"><h3>Original Text</h3></div><textarea id="t1" placeholder="Old text..."></textarea></div>
      <div class="panel" style="min-height: 250px;"><div class="panel-header"><h3>Modified Text</h3></div><textarea id="t2" placeholder="New text..."></textarea></div>
    </div>
    
    <div class="panel">
      <div class="panel-header"><h3>Differences</h3><button onclick="compare()" class="btn-primary">Compare</button></div>
      <pre id="diff-out" style="min-height: 200px;">Click compare to see results...</pre>
    </div>
  <footer style="text-align: center; padding: 2rem 0; margin-top: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem;">
      <p>&copy; <script>document.write(new Date().getFullYear())</script> Client-Side Toolbox. All rights reserved.</p>
      <div style="margin-top: 1rem; margin-bottom: 1rem;">
      <a href="https://github.com/fzantalis/client-side-toolbox" target="_blank" rel="noopener noreferrer" style="color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 500; transition: color 0.2s;">
        <i class="ph ph-github-logo" style="font-size: 1.25rem;"></i>
        View Source on GitHub
      </a>
    </div>
      <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 0.5rem;">
        <a href="privacy.html" style="color: var(--text-muted); text-decoration: none;">Privacy Policy</a>
        <span>&bull;</span>
        <a href="terms.html" style="color: var(--text-muted); text-decoration: none;">Terms of Service</a>
      </div>
    </footer>
  </div>
  <script>
    function compare() {
      const t1 = document.getElementById('t1').value.split('\n');
      const t2 = document.getElementById('t2').value.split('\n');
      const out = document.getElementById('diff-out');
      out.innerHTML = '';
      
      // Ultra-basic line-by-line comparison
      let html = '';
      const max = Math.max(t1.length, t2.length);
      for(let i=0; i<max; i++) {
        const a = t1[i] || ''; const b = t2[i] || '';
        if(a === b) { html += `<span style="display:block; padding: 2px 4px;">${a}</span>`; } 
        else {
          if(a) html += `<span class="diff-del">${a}</span>`;
          if(b) html += `<span class="diff-ins">${b}</span>`;
        }
      }
      out.innerHTML = html || 'No differences found.';
    }
  </script>
  <script src="theme-toggle.js"></script>
  <script src="script.js"></script>
</body></html>
