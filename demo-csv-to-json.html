<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css"/><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <title>CSV Converter</title>
</head>
<body>
  <div class="container">
    <a href="index.html" class="breadcrumb"><i class="ph ph-arrow-left"></i> Back to Toolbox</a>
    <header class="tool-header">
      <div class="card-icon"><i class="ph ph-table"></i></div>
      <div class="tool-header-text">
        <h1>CSV to JSON / SQL</h1>
        <p>Convert comma-separated values into structured JSON or SQL insert statements.</p>
      </div>
    </header>
    <main class="workspace">
      <div class="panel">
        <div class="panel-header">
          <h3>Input CSV</h3>
          <div class="panel-actions">
            <button onclick="convertJson()" class="btn-primary"><i class="ph ph-brackets-curly"></i> To JSON</button>
            <button onclick="convertSql()" class="btn-primary"><i class="ph ph-database"></i> To SQL</button>
          </div>
        </div>
        <textarea id="csv" placeholder="header1,header2&#10;value1,value2"></textarea>
      </div>
      <div class="panel">
        <div class="panel-header"><h3>Output</h3></div>
        <pre id="out">Result will appear here...</pre>
      </div>
    </main>
    <footer style="text-align: center; padding: 2rem 0; margin-top: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem;">
      <p>&copy; <script>document.write(new Date().getFullYear())</script> Client-Side Toolbox. All rights reserved.</p>
      <div style="margin-top: 1rem; margin-bottom: 1rem;">
      <a href="https://github.com/fzantalis/client-side-toolbox" target="_blank" rel="noopener noreferrer" style="color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 500; transition: color 0.2s;">
        <i class="ph ph-github-logo" style="font-size: 1.25rem;"></i>
        View Source on GitHub
      </a>
    </div>
      <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 0.5rem;">
        <a href="privacy.html" style="color: var(--text-muted); text-decoration: none;">Privacy Policy</a>
        <span>&bull;</span>
        <a href="terms.html" style="color: var(--text-muted); text-decoration: none;">Terms of Service</a>
      </div>
    </footer>
  </div>
  <script>
    function csvToJson(csv){
      const lines = csv.trim().split(/\r?\n/);
      if(lines.length===0||lines[0].trim()==='') return [];
      const header = lines[0].split(',').map(h=>h.trim());
      return lines.slice(1).filter(l=>l.trim().length>0).map(line=>{
        const vals = line.split(',').map(v=>v.trim());
        const obj={}; header.forEach((k,i)=>{ obj[k]= vals[i]||''; }); return obj;
      });
    }
    function convertJson(){
      const json = csvToJson(document.getElementById('csv').value);
      document.getElementById('out').textContent = JSON.stringify(json, null, 2);
    }
    function convertSql(){
      const rows = csvToJson(document.getElementById('csv').value);
      if(!rows.length){ document.getElementById('out').textContent = 'No valid data.'; return; }
      const cols = Object.keys(rows[0]);
      const esc = v => v===null||v===undefined?'NULL':('"'+String(v).replace(/"/g,'\\"')+'"');
      const inserts = rows.map(r=> `INSERT INTO csv_data (${cols.join(',')}) VALUES (${cols.map(c=> esc(r[c])).join(',')});`);
      document.getElementById('out').textContent = inserts.join('\n');
    }
  </script>
  <script src="theme-toggle.js"></script>
  <script src="script.js"></script>
</body></html>
