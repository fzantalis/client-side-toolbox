<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Voltage Divider Calculator | Free Electronics Tool</title>
  <meta name="title" content="Voltage Divider Calculator | Free Electronics Tool">
  <meta name="description" content="Calculate the output voltage of a resistor divider circuit instantly. Features an interactive, real-time visual schematic. A free client-side tool.">
  <meta name="keywords" content="voltage divider calculator, resistor divider, vout calculator, electronics tool, circuit calculator, client-side, browser-based tool">
  <meta name="author" content="fzantalis">

  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="canonical" href="https://zantalis.net/demo-voltage-divider.html">

  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    /* Fix for overlapping number inputs */
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }

    .form-control {
      width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg); color: var(--text-main);
      font-family: inherit; font-size: 0.95rem; transition: all 0.2s ease;
    }
    .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--ring); }
    .input-row { display: flex; gap: 0.75rem; margin-bottom: 1rem; }
    .input-row > div:first-child { flex: 2; position: relative; display: flex; align-items: center; }
    .input-row > div:last-child { flex: 1; }
    
    .input-suffix {
      position: absolute; right: 1rem; color: var(--text-muted);
      font-family: 'Fira Code', monospace; font-size: 0.9rem; pointer-events: none;
    }

    /* CSS Circuit Schematic - Refactored for Zero Overlap */
    .circuit-container {
      display: flex; flex-direction: column; align-items: center;
      padding: 2rem 1rem; background: var(--bg); border-radius: 12px;
      border: 1px solid var(--border); margin-bottom: 1.5rem;
      overflow-x: auto;
    }
    .schematic {
      position: relative; width: 140px; height: 260px;
      display: flex; flex-direction: column; align-items: center;
      margin: 0 auto;
    }
    .wire-v { width: 4px; background: var(--text-main); flex-grow: 1; z-index: 1; }
    
    /* Vout node and horizontal wire pinned exactly from the center */
    .node { position: absolute; width: 12px; height: 12px; background: var(--primary); border-radius: 50%; top: 50%; transform: translate(-50%, -50%); left: 50%; z-index: 2;}
    .wire-h { position: absolute; height: 4px; background: var(--text-main); width: 50px; left: 50%; top: 50%; transform: translateY(-50%); z-index: 1;}
    
    .resistor-symbol {
      width: 30px; height: 60px; background: transparent;
      background-image: repeating-linear-gradient(-45deg, transparent, transparent 4px, var(--text-main) 4px, var(--text-main) 8px);
      border: 2px solid var(--text-main); z-index: 2; background-color: var(--card-bg);
    }
    
    .label { position: absolute; font-family: 'Fira Code', monospace; font-size: 0.85rem; font-weight: 600; white-space: nowrap; }
    .label-vin { top: -25px; left: 50%; transform: translateX(-50%); color: var(--accent); font-size: 1rem;}
    
    /* Pinned explicitly to the right of the vertical wire */
    .label-r1 { top: 20%; left: calc(50% + 25px); color: var(--text-muted); }
    .label-r2 { bottom: 20%; left: calc(50% + 25px); color: var(--text-muted); }
    
    /* Pinned explicitly to the right of the horizontal wire */
    .label-vout { 
      top: 50%; left: calc(50% + 60px); transform: translateY(-50%); 
      color: var(--primary); font-size: 1.25rem; background: var(--bg); 
      padding: 0.25rem 0.5rem; border-radius: 6px; border: 1px solid var(--primary);
    }
    
    .label-gnd { bottom: -20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 2px;}
    .gnd-line { height: 2px; background: var(--text-main); }

    .result-box {
      text-align: center; padding: 1.5rem; background: var(--card-bg);
      border: 1px solid var(--primary); border-radius: 12px; box-shadow: var(--shadow-sm);
    }
    .result-box span { display: block; font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 0.5rem; }
    .result-box strong { font-size: 2.5rem; color: var(--primary); font-family: 'Fira Code', monospace; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="breadcrumb"><i class="ph ph-arrow-left"></i> Back to Toolbox</a>
    <header class="tool-header">
      <div class="card-icon"><i class="ph ph-unite"></i></div>
      <div class="tool-header-text">
        <h1>Voltage Divider Calculator</h1>
        <p>Calculate the output voltage of a two-resistor divider circuit instantly.</p>
      </div>
    </header>
    <main class="workspace">
      
      <div class="panel">
        <div class="panel-header"><h3>Circuit Values</h3></div>
        <div class="panel-body">
          
          <div class="form-group">
            <label for="input-vin">Input Voltage (Vin)</label>
            <div class="input-row">
              <div>
                <input type="number" id="input-vin" class="form-control" value="5" step="any">
                <span class="input-suffix">V</span>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="input-r1">Resistor 1 (R1)</label>
            <div class="input-row">
              <div>
                <input type="number" id="input-r1" class="form-control" value="10" step="any" min="0">
              </div>
              <div>
                <select id="unit-r1" class="form-control">
                  <option value="1">Ω</option>
                  <option value="1000" selected>kΩ</option>
                  <option value="1000000">MΩ</option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="input-r2">Resistor 2 (R2)</label>
            <div class="input-row">
              <div>
                <input type="number" id="input-r2" class="form-control" value="10" step="any" min="0">
              </div>
              <div>
                <select id="unit-r2" class="form-control">
                  <option value="1">Ω</option>
                  <option value="1000" selected>kΩ</option>
                  <option value="1000000">MΩ</option>
                </select>
              </div>
            </div>
          </div>

        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><h3>Schematic & Output</h3></div>
        <div class="panel-body">
          
          <div class="circuit-container">
            <div class="schematic">
              <div class="label label-vin" id="lbl-vin">5V</div>
              
              <div class="wire-v"></div>
              <div class="resistor-symbol"></div>
              <div class="label label-r1" id="lbl-r1">10 kΩ</div>
              <div class="wire-v"></div>
              
              <div class="node"></div>
              <div class="wire-h"></div>
              <div class="label label-vout" id="lbl-vout">2.50 V</div>

              <div class="wire-v"></div>
              <div class="resistor-symbol"></div>
              <div class="label label-r2" id="lbl-r2">10 kΩ</div>
              <div class="wire-v"></div>

              <div class="label label-gnd">
                <div class="gnd-line" style="width: 20px;"></div>
                <div class="gnd-line" style="width: 12px;"></div>
                <div class="gnd-line" style="width: 4px;"></div>
              </div>
            </div>
          </div>

          <div class="result-box">
            <span>Output Voltage (Vout)</span>
            <strong id="out-result">2.50 V</strong>
          </div>

        </div>
      </div>

    </main>

    </div>
  
  <script>
    const els = {
      vin: document.getElementById('input-vin'),
      r1: document.getElementById('input-r1'),
      u1: document.getElementById('unit-r1'),
      r2: document.getElementById('input-r2'),
      u2: document.getElementById('unit-r2'),
      out: document.getElementById('out-result'),
      lblVin: document.getElementById('lbl-vin'),
      lblVout: document.getElementById('lbl-vout'),
      lblR1: document.getElementById('lbl-r1'),
      lblR2: document.getElementById('lbl-r2')
    };

    function calculate() {
      const vin = parseFloat(els.vin.value) || 0;
      const r1 = parseFloat(els.r1.value) || 0;
      const u1 = parseFloat(els.u1.value) || 1;
      const r2 = parseFloat(els.r2.value) || 0;
      const u2 = parseFloat(els.u2.value) || 1;

      const r1Ohms = r1 * u1;
      const r2Ohms = r2 * u2;

      let vout = 0;
      if (r1Ohms + r2Ohms > 0) {
        vout = vin * (r2Ohms / (r1Ohms + r2Ohms));
      }

      const voutFormatted = vout.toFixed(2) + ' V';
      els.out.innerText = voutFormatted;
      els.lblVin.innerText = vin + 'V';
      els.lblVout.innerText = voutFormatted;
      
      const getUnitLabel = (val) => val == 1 ? 'Ω' : (val == 1000 ? 'kΩ' : 'MΩ');
      els.lblR1.innerText = `${r1} ${getUnitLabel(u1)}`;
      els.lblR2.innerText = `${r2} ${getUnitLabel(u2)}`;
    }

    [els.vin, els.r1, els.u1, els.r2, els.u2].forEach(input => {
      input.addEventListener('input', calculate);
      input.addEventListener('change', calculate);
    });

    calculate();
  </script>
</body>
</html>
