<body>
  <div class="container">
    <a href="index.html" class="breadcrumb"><i class="ph ph-arrow-left"></i> Back to Toolbox</a>
    <header class="tool-header"><div class="card-icon"><i class="ph ph-markdown-logo"></i></div>
      <div class="tool-header-text"><h1>Real-Time Markdown</h1><p>Write Markdown and instantly preview the HTML output.</p></div>
    </header>
    <main class="workspace">
      <div class="panel">
        <div class="panel-header"><h3>Markdown Input</h3></div>
        <textarea id="editor" placeholder="# Hello World\nStart typing markdown here..."></textarea>
      </div>
      <div class="panel">
        <div class="panel-header"><h3>Live Preview</h3></div>
        <div id="preview" style="padding: 1.5rem; flex-grow: 1; overflow-y: auto; background: var(--card-bg); line-height:1.6;"></div>
      </div>
    </main>
    <footer style="text-align: center; padding: 2rem 0; margin-top: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem;">
      <p>&copy; <script>document.write(new Date().getFullYear())</script> Client-Side Toolbox. All rights reserved.</p>
      <div style="margin-top: 1rem; margin-bottom: 1rem;">
      <a href="https://github.com/fzantalis/client-side-toolbox" target="_blank" rel="noopener noreferrer" style="color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 500; transition: color 0.2s;">
        <i class="ph ph-github-logo" style="font-size: 1.25rem;"></i>
        View Source on GitHub
      </a>
    </div>
      <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 0.5rem;">

        <span>&bull;</span>
        <a href="terms.html" style="color: var(--text-muted); text-decoration: none;">Terms of Service</a>
      </div>
    </footer>
  </div>
  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    // Initial content
    editor.value = "# Welcome\n\nThis is a **client-side** markdown editor.\n\n* Real-time preview\n* Secure & private\n* Supports standard Markdown";
    preview.innerHTML = marked.parse(editor.value);

    editor.addEventListener('input', (e) => {
      preview.innerHTML = marked.parse(e.target.value);
    });
  </script>
  <script src="theme-toggle.js"></script>
  <script src="script.js"></script>
