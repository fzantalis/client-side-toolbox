<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <title>Currency Converter</title>
  <style>
    .form-control { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text-main); font-family: inherit; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    .form-control:focus { border-color: var(--primary); }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="breadcrumb"><i class="ph ph-arrow-left"></i> Back to Toolbox</a>
    <header class="tool-header">
      <div class="card-icon"><i class="ph ph-currency-circle-dollar"></i></div>
      <div class="tool-header-text">
        <h1>Currency Converter</h1>
        <p>Offline conversion using baseline fixed rates. Quick and private.</p>
      </div>
    </header>
    <main class="workspace">
      <div class="panel">
        <div class="panel-header"><h3>Exchange Details</h3></div>
        <div class="panel-body">
          <div class="form-group">
            <label>Amount</label>
            <input type="number" id="amount" class="form-control" value="100" oninput="convertCurrency()">
          </div>
          <div class="form-group">
            <label>From Currency</label>
            <select id="currencyFrom" class="form-control" onchange="convertCurrency()">
               <option value="USD" selected>USD - US Dollar</option>
               <option value="EUR">EUR - Euro</option>
               <option value="GBP">GBP - British Pound</option>
               <option value="JPY">JPY - Japanese Yen</option>
               <option value="INR">INR - Indian Rupee</option>
               <option value="CNY">CNY - Chinese Yuan</option>
               <option value="AUD">AUD - Australian Dollar</option>
               <option value="CAD">CAD - Canadian Dollar</option>
            </select>
          </div>
          <div class="form-group">
            <label>To Currency</label>
            <select id="currencyTo" class="form-control" onchange="convertCurrency()">
               <option value="USD">USD - US Dollar</option>
               <option value="EUR" selected>EUR - Euro</option>
               <option value="GBP">GBP - British Pound</option>
               <option value="JPY">JPY - Japanese Yen</option>
               <option value="INR">INR - Indian Rupee</option>
               <option value="CNY">CNY - Chinese Yuan</option>
               <option value="AUD">AUD - Australian Dollar</option>
               <option value="CAD">CAD - Canadian Dollar</option>
            </select>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header"><h3>Converted Amount</h3></div>
        <div class="panel-body">
          <div class="result-display" style="flex-direction: column; gap: 1rem;">
            <div id="resultDisplay" style="font-size: 3rem; word-break: break-all;">92.00 EUR</div>
            <div id="rateText" style="font-size: 1rem; color: var(--text-muted); font-weight: 500; padding: 0.5rem 1rem; background: var(--bg); border-radius: 99px;">1 USD = 0.9200 EUR</div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    const rates = { USD: 1, EUR: 0.92, GBP: 0.79, JPY: 150.5, INR: 83.2, CNY: 7.23, AUD: 1.52, CAD: 1.35 };

    function convertCurrency() {
      const amount = parseFloat(document.getElementById('amount').value) || 0;
      const from = document.getElementById('currencyFrom').value;
      const to = document.getElementById('currencyTo').value;
      
      const inUSD = amount / rates[from];
      const result = inUSD * rates[to];
      const singleRate = (1 / rates[from]) * rates[to];

      document.getElementById('resultDisplay').innerText = `${result.toFixed(2)} ${to}`;
      document.getElementById('rateText').innerText = `1 ${from} = ${singleRate.toFixed(4)} ${to}`;
    }
    
    document.addEventListener('DOMContentLoaded', convertCurrency);
  </script>
  <script src="script.js"></script>
  <script src="theme-toggle.js"></script>
</body>
</html>
