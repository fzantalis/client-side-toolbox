  <style>
    .lap-item { display: flex; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid var(--border); font-family: 'Fira Code', monospace; font-size: 1.1rem; }
    .lap-item strong { color: var(--text-main); }
    .lap-item span { color: var(--text-muted); }

    /* Responsive adjustments for mobile */
    .timer-display {
      font-family: 'Fira Code', monospace;
      font-size: clamp(2.2rem, 11vw, 4rem); /* Scales down automatically on small screens */
      letter-spacing: -2px;
      color: var(--text-main);
      margin-bottom: 2rem;
      white-space: nowrap; /* Prevents the timer from splitting into two lines */
    }

    .controls-wrapper {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap; /* Allows buttons to wrap on very narrow screens */
      justify-content: center;
      width: 100%;
    }

    .controls-wrapper button {
      flex: 1 1 auto;
      min-width: 100px;
      padding: 0.75rem 1rem;
      font-size: 1.05rem;
      justify-content: center;
    }

    /* Stop buttons from stretching too wide on tablets/desktops */
    @media (min-width: 480px) {
      .controls-wrapper button {
        flex: 0 1 auto;
        padding: 0.75rem 1.5rem;
      }
      .controls-wrapper #startBtn {
        padding: 0.75rem 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="breadcrumb"><i class="ph ph-arrow-left"></i> Back to Toolbox</a>
    <header class="tool-header">
      <div class="card-icon"><i class="ph ph-timer"></i></div>
      <div class="tool-header-text">
        <h1>Stopwatch & Timer</h1>
        <p>Millisecond precision stopwatch with lap tracking.</p>
      </div>
    </header>
    <main class="workspace">
      <div class="panel">
        <div class="panel-header"><h3>Timer</h3></div>
        <div class="panel-body" style="justify-content: center; align-items: center; text-align: center;">
          <div class="result-display timer-display" id="timeDisplay">
            00:00:00.00
          </div>
          <div class="controls-wrapper">
            <button class="btn-primary" id="startBtn" onclick="toggleTimer()"><i class="ph ph-play"></i> Start</button>
            <button class="btn-secondary" onclick="recordLap()"><i class="ph ph-flag"></i> Lap</button>
            <button class="btn-secondary error-text" onclick="resetTimer()"><i class="ph ph-arrow-counter-clockwise"></i> Reset</button>
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <h3>Lap Times</h3>
          <span id="lapCountHeader" style="font-size: 0.9rem; color: var(--text-muted);">0 Laps</span>
        </div>
        <div class="panel-body" style="padding: 1rem 1.5rem; justify-content: flex-start;">
          <div id="laps" style="display: flex; flex-direction: column; width: 100%;">
             <p style="color: var(--text-muted); text-align: center; margin-top: 2rem;" id="emptyLaps">No laps recorded yet.</p>
          </div>
        </div>
      </div>
    </main>
    <footer style="text-align: center; padding: 2rem 0; margin-top: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem;">
      <p>&copy; <script>document.write(new Date().getFullYear())</script> Client-Side Toolbox. All rights reserved.</p>
      <div style="margin-top: 1rem; margin-bottom: 1rem;">
      <a href="https://github.com/fzantalis/client-side-toolbox" target="_blank" rel="noopener noreferrer" style="color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 500; transition: color 0.2s;">
        <i class="ph ph-github-logo" style="font-size: 1.25rem;"></i>
        View Source on GitHub
      </a>
    </div>
      <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 0.5rem;">
        <a href="privacy.html" style="color: var(--text-muted); text-decoration: none;">Privacy Policy</a>
        <span>&bull;</span>
        <a href="terms.html" style="color: var(--text-muted); text-decoration: none;">Terms of Service</a>
      </div>
    </footer>
  </div>
  <script>
    let startTime = 0, elapsedTime = 0, timerInterval;
    let isRunning = false, lapCount = 1;
    const display = document.getElementById('timeDisplay');
    const startBtn = document.getElementById('startBtn');
    const lapsList = document.getElementById('laps');
    const emptyLaps = document.getElementById('emptyLaps');
    const lapHeader = document.getElementById('lapCountHeader');

    function formatTime(time) {
      const date = new Date(time);
      const h = String(Math.floor(time / 3600000)).padStart(2, '0');
      const m = String(date.getUTCMinutes()).padStart(2, '0');
      const s = String(date.getUTCSeconds()).padStart(2, '0');
      const ms = String(Math.floor(date.getUTCMilliseconds() / 10)).padStart(2, '0');
      return `${h}:${m}:${s}.${ms}`;
    }

    function updateDisplay() {
      elapsedTime = Date.now() - startTime;
      display.textContent = formatTime(elapsedTime);
    }

    function toggleTimer() {
      if (!isRunning) {
        startTime = Date.now() - elapsedTime;
        timerInterval = setInterval(updateDisplay, 10);
        startBtn.innerHTML = '<i class="ph ph-pause"></i> Pause';
        startBtn.style.background = '#eab308'; // Warning yellow
        isRunning = true;
      } else {
        clearInterval(timerInterval);
        startBtn.innerHTML = '<i class="ph ph-play"></i> Resume';
        startBtn.style.background = 'var(--primary)';
        isRunning = false;
      }
    }

    function resetTimer() {
      clearInterval(timerInterval);
      isRunning = false; elapsedTime = 0; lapCount = 1;
      display.textContent = '00:00:00.00';
      startBtn.innerHTML = '<i class="ph ph-play"></i> Start';
      startBtn.style.background = 'var(--primary)';
      lapsList.innerHTML = '<p style="color: var(--text-muted); text-align: center; margin-top: 2rem;" id="emptyLaps">No laps recorded yet.</p>';
      lapHeader.innerText = '0 Laps';
    }

    function recordLap() {
      if (!isRunning) return;
      if (document.getElementById('emptyLaps')) document.getElementById('emptyLaps').remove();
      
      const div = document.createElement('div');
      div.className = 'lap-item';
      div.innerHTML = `<span>Lap ${lapCount}</span><strong>${formatTime(elapsedTime)}</strong>`;
      lapsList.prepend(div);
      
      lapHeader.innerText = `${lapCount} Laps`;
      lapCount++;
    }
  </script>
  <script src="script.js"></script>
  <script src="theme-toggle.js"></script>
</body>
</html>
